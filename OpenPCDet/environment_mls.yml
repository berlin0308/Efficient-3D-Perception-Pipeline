# Conda environment "mls" for OpenPCDet with torch.compile support.
# Requires: Python 3.11 + PyTorch 2.1+ (torch.compile supports Python 3.11 from 2.1).
# After creating: run create_mls_env.sh or follow INSTALL_MLS.md to install PyTorch CUDA and pcdet.

name: mls
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pyyaml
  - scikit-image
  - tqdm
  - opencv
  - pip:
    - llvmlite
    - numba
    - tensorboardX
    - easydict
    - SharedArray
    - pyquaternion
